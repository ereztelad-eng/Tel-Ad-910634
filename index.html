<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEL-AD | PROTOCOL_Ω</title>
    <!-- Firebase Legacy SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap');
        
        :root { 
            --neon: #00ff41; 
            --dim: #002200; 
            --bg: #000;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg); color: var(--neon); 
            font-family: 'Major Mono Display', monospace; 
            overflow: hidden; 
        }
        
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .active { display: flex; }

        /* מסך 1 - מונה משותף */
        #counter-display { font-size: 80px; margin-bottom: 40px; text-shadow: 0 0 20px var(--neon); }
        #long-press-btn { 
            width: 280px; height: 280px; border-radius: 50%; border: 1px solid var(--neon);
            background: none; color: var(--neon); font-size: 16px; cursor: pointer;
            box-shadow: inset 0 0 30px var(--dim), 0 0 15px var(--dim);
            transition: all 0.1s; outline: none;
        }
        #long-press-btn:active { background: var(--neon); color: #000; box-shadow: 0 0 50px var(--neon); }

        /* תפריט ראשי */
        .menu-btn { 
            width: 380px; padding: 18px; margin: 12px; border: 1px solid var(--neon); 
            background: none; color: var(--neon); font-size: 18px; cursor: pointer;
            font-family: inherit; transition: 0.4s;
        }
        .menu-btn:hover:not(:disabled) { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }
        .menu-btn:disabled { border-color: #111; color: #111; cursor: not-allowed; }

        /* עץ החיים ויזואלי */
        #tree-container { position: relative; width: 350px; height: 550px; margin: auto; }
        .sephira { 
            position: absolute; width: 50px; height: 50px; border-radius: 50%; 
            border: 1px solid var(--neon); background: #000; cursor: pointer; 
            transition: 0.5s ease; z-index: 5;
        }
        .sephira.active { background: var(--neon); box-shadow: 0 0 30px var(--neon); }

        /* פלאפי בירד */
        #flappy-canvas { border: 1px solid var(--neon); background: #000; cursor: crosshair; }
        #hidden-code { 
            margin-top: 20px; font-size: 12px; 
            color: #030303; /* כמעט שחור לגמרי - דורש סימון או הטיית מסך */
            user-select: all; transition: color 10s; 
        }

        /* דלת אחורית */
        #backdoor { position: fixed; bottom: 0; left: 0; width: 15px; height: 15px; z-index: 9999; cursor: default; }

        /* שדה הזנת קוד */
        #final-input {
            background: none; border: none; border-bottom: 2px solid var(--neon);
            color: var(--neon); text-align: center; font-size: 40px; 
            width: 200px; outline: none; margin-bottom: 30px;
        }
    </style>
</head>
<body>

<!-- צ'יט פיקסל -->
<div id="backdoor" onclick="showScreen('screen-2')"></div>

<!-- מסך 1: הסנכרון -->
<div id="screen-1" class="screen active">
    <div id="counter-display">00/07</div>
    <button id="long-press-btn">H0LD_T0_V3RIFY</button>
</div>

<!-- מסך 2: התפריט -->
<div id="screen-2" class="screen">
    <button class="menu-btn" onclick="openSub(1)">STRNRT_01: SYMB0L_G4T3</button>
    <button class="menu-btn" id="btn-2" onclick="openSub(2)" disabled>STRNRT_02: KIN3TIC_FL0W</button>
    <button class="menu-btn" id="btn-3" onclick="openSub(3)" disabled>STRNRT_03: C0R3_4CC3SS</button>
</div>

<!-- שלב 1: עץ החיים -->
<div id="sub-1" class="screen">
    <div id="tree-container"></div>
    <button class="menu-btn" style="width:150px; margin-top:30px" onclick="backToMenu()">R3TURN</button>
</div>

<!-- שלב 2: פלאפי -->
<div id="sub-2" class="screen">
    <canvas id="flappy-canvas" width="320" height="480"></canvas>
    <div id="hidden-code">SYSTEM_NULL</div>
    <button class="menu-btn" style="width:150px; margin-top:20px" onclick="backToMenu()">R3TURN</button>
</div>

<!-- שלב 3: סיום -->
<div id="sub-3" class="screen">
    <input type="text" id="final-input" maxlength="4" placeholder="****">
    <button class="menu-btn" style="width:200px" onclick="checkFinalCode()">3X3CUT3</button>
</div>

<script>
    // --- אתחול FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBmwZMuHZY_c652BWnqiP9tp1QfwutoZAE",
        authDomain: "tel-ad.firebaseapp.com",
        projectId: "tel-ad",
        databaseURL: "https://tel-ad-default-rtdb.firebaseio.com",
        appId: "1:182338846469:web:5b84052752e9663555816c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const globalCounterRef = db.ref('sync_status/counter');

    // --- מונה מולטיפלייר עם עונש ---
    let pressTimer;
    const syncBtn = document.getElementById('long-press-btn');

    syncBtn.addEventListener('mousedown', () => {
        pressTimer = setTimeout(() => {
            globalCounterRef.transaction(c => (c || 0) + 1);
        }, 1200);
    });

    syncBtn.addEventListener('mouseup', () => {
        clearTimeout(pressTimer);
        // עונש: ירידה באחד לכל מי שעוזב
        globalCounterRef.transaction(c => (c > 0 ? c - 1 : 0));
    });

    globalCounterRef.on('value', snap => {
        const val = snap.val() || 0;
        document.getElementById('counter-display').innerText = `0${val}/07`.slice(-5);
        if (val >= 7) showScreen('screen-2');
    });

    // --- ניהול מסכים ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function openSub(n) { showScreen(`sub-${n}`); if(n===2) startFlappy(); }
    function backToMenu() { showScreen('screen-2'); }

    // --- עץ החיים (ללא טקסט) ---
    const coords = [
        {id:0, x:150, y:10},  {id:1, x:250, y:70}, {id:2, x:50, y:70},
        {id:3, x:250, y:170}, {id:4, x:50, y:170}, {id:5, x:150, y:230},
        {id:6, x:250, y:330}, {id:7, x:50, y:330}, {id:8, x:150, y:390}, {id:9, x:150, y:490}
    ];
    let activeNodes = [];
    const treeBox = document.getElementById('tree-container');

    coords.forEach(pt => {
        const node = document.createElement('div');
        node.className = 'sephira';
        node.style.left = pt.x + 'px'; node.style.top = pt.y + 'px';
        node.onclick = () => {
            node.classList.toggle('active');
            if(node.classList.contains('active')) activeNodes.push(pt.id);
            else activeNodes = activeNodes.filter(i => i !== pt.id);
            
            // בדיקה: חכמה(1), גבורה(4), נצח(6) - בלבד!
            const win = [1, 4, 6].every(v => activeNodes.includes(v)) && activeNodes.length === 3;
            if(win) document.getElementById('btn-2').disabled = false;
        };
        treeBox.appendChild(node);
    });

    // --- Flappy Bird (הקוד הכמעט שקוף) ---
    const canvas = document.getElementById('flappy-canvas');
    const ctx = canvas.getContext('2d');
    let birdY, birdV, score, loop;

    function startFlappy() {
        birdY = 240; birdV = 0; score = 0;
        if(loop) cancelAnimationFrame(loop);
        animate();
    }

    canvas.onclick = () => birdV = -4;

    function animate() {
        ctx.fillStyle = "black"; ctx.fillRect(0,0,320,480);
        birdV += 0.2; birdY += birdV;
        ctx.fillStyle = "#00ff41"; ctx.fillRect(60, birdY, 15, 15);
        
        score += 0.02;
        let s = Math.floor(score);
        ctx.font = "12px monospace"; ctx.fillText("SCORE: " + s, 10, 20);

        if(s >= 20) {
            // הקוד מופיע בצבע קרוב מאוד לשחור של הרקע
            document.getElementById('hidden-code').innerText = "V3RIFY_ID: 9851";
            document.getElementById('btn-3').disabled = false;
        }

        if(birdY > 480 || birdY < 0) startFlappy();
        else loop = requestAnimationFrame(animate);
    }

    // --- אימות וסגירה ---
    function checkFinalCode() {
        const inp = document.getElementById('final-input').value;
        if(inp === "9851") {
            alert("מי אלה? איפה אני?");
            // אפקט השמדה
            document.body.innerHTML = "<div style='display:flex; height:100vh; align-items:center; justify-content:center; background:#000; color:#00ff41; font-size:20px;'>TERMINAL CLOSED. CONNECTION LOST.</div>";
            setTimeout(() => { window.close(); }, 3000);
        } else {
            alert("ACCESS DENIED.");
        }
    }
</script>
</body>
</html>
