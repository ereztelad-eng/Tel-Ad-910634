<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TEL-AD | PROTOCOL_Ω</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Major+Mono+Display&display=swap');
        
        :root { --neon: #00ff41; --dim: #002200; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: var(--neon); font-family: 'Major Mono Display', monospace; overflow: hidden; }
        
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .active { display: flex; }

        /* מסך 1 - המונה המשותף */
        #long-press-btn { 
            width: 250px; height: 250px; border-radius: 50%; border: 2px solid var(--neon);
            background: none; color: var(--neon); font-size: 18px; cursor: pointer;
            box-shadow: inset 0 0 20px var(--neon), 0 0 20px var(--neon);
            transition: all 0.1s;
        }
        #long-press-btn:active { background: var(--neon); color: #000; transform: scale(0.98); }
        #counter-display { font-size: 60px; margin-bottom: 30px; text-shadow: 0 0 15px var(--neon); }

        /* תפריט */
        .menu-btn { 
            width: 350px; padding: 15px; margin: 10px; border: 1px solid var(--neon); 
            background: none; color: var(--neon); font-size: 20px; cursor: pointer;
            font-family: inherit; transition: 0.3s;
        }
        .menu-btn:hover:not(:disabled) { background: var(--neon); color: #000; }
        .menu-btn:disabled { border-color: #111; color: #222; }

        /* עץ החיים - גרסה ויזואלית ללא טקסט */
        #tree-container { position: relative; width: 350px; height: 550px; }
        .sephira { 
            position: absolute; width: 55px; height: 55px; border-radius: 50%; 
            border: 1px solid var(--neon); background: #000; cursor: pointer; 
            transition: 0.4s; z-index: 2;
        }
        .sephira.active { background: var(--neon); box-shadow: 0 0 25px var(--neon); }
        /* קווים מחברים בעץ */
        .line { position: absolute; background: var(--dim); z-index: 1; pointer-events: none; }

        /* פלאפי בירד */
        #flappy-canvas { border: 1px solid var(--neon); box-shadow: 0 0 30px #000; }
        #hidden-code { 
            margin-top: 15px; font-size: 10px; color: #001100; /* כמעט בלתי נראה */
            user-select: none; transition: 5s; 
        }

        /* דלת אחורית */
        #backdoor { position: fixed; bottom: 0; left: 0; width: 10px; height: 10px; z-index: 9999; }
    </style>
</head>
<body>

<div id="backdoor" onclick="showScreen('screen-2')"></div>

<!-- מסך 1 -->
<div id="screen-1" class="screen active">
    <div id="counter-display">00/07</div>
    <button id="long-press-btn">H0LD T0 SYNCHR0NIZ3</button>
</div>

<!-- מסך 2: תפריט -->
<div id="screen-2" class="screen">
    <button class="menu-btn" onclick="openSub(1)">PHASE_01: SYMBOLISM</button>
    <button class="menu-btn" id="btn-2" onclick="openSub(2)" disabled>PHASE_02: KINETIC</button>
    <button class="menu-btn" id="btn-3" onclick="openSub(3)" disabled>PHASE_03: ACCESS</button>
</div>

<!-- תת מסך 1: עץ החיים -->
<div id="sub-1" class="screen">
    <div id="tree-container"></div>
    <button class="menu-btn" style="width:120px; margin-top:20px" onclick="backToMenu()">BACK</button>
</div>

<!-- תת מסך 2: פלאפי -->
<div id="sub-2" class="screen">
    <canvas id="flappy-canvas" width="320" height="480"></canvas>
    <div id="hidden-code"></div>
    <button class="menu-btn" style="width:120px; margin-top:20px" onclick="backToMenu()">BACK</button>
</div>

<!-- תת מסך 3: קוד סופי -->
<div id="sub-3" class="screen">
    <p>3NT3R CR3D3NTI4LS</p>
    <input type="text" id="final-input" style="background:none; border:none; border-bottom:1px solid var(--neon); color:var(--neon); text-align:center; font-size:30px; outline:none;">
    <button class="menu-btn" style="width:150px; margin-top:30px" onclick="checkFinalCode()">V3RIFY</button>
</div>

<script>
    // --- FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyBmwZMuHZY_c652BWnqiP9tp1QfwutoZAE",
        authDomain: "tel-ad.firebaseapp.com",
        projectId: "tel-ad",
        databaseURL: "https://tel-ad-default-rtdb.firebaseio.com",
        appId: "1:182338846469:web:5b84052752e9663555816c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const globalCounterRef = db.ref('global_press_count');

    // --- מונה עם עונש (Penalty) ---
    let pressTimer;
    const btn = document.getElementById('long-press-btn');

    btn.addEventListener('mousedown', () => {
        pressTimer = setTimeout(() => {
            globalCounterRef.transaction(c => (c || 0) + 1);
        }, 1500);
    });

    btn.addEventListener('mouseup', () => {
        clearTimeout(pressTimer);
        // עונש: אם מפסיקים ללחוץ, המונה יורד ב-1 (לא מתחת ל-0)
        globalCounterRef.transaction(c => (c > 0 ? c - 1 : 0));
    });

    globalCounterRef.on('value', snap => {
        const val = snap.val() || 0;
        document.getElementById('counter-display').innerText = `0${val}/07`.slice(-5);
        if (val >= 7) showScreen('screen-2');
    });

    // --- ניהול מסכים ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function openSub(n) { showScreen(`sub-${n}`); if(n===2) initFlappy(); }
    function backToMenu() { showScreen('screen-2'); }

    // --- עץ החיים (חידה ויזואלית) ---
    const tree = [
        {id:0, x:145, y:20}, {id:1, x:245, y:80}, {id:2, x:45, y:80},
        {id:3, x:245, y:180}, {id:4, x:45, y:180}, {id:5, x:145, y:240},
        {id:6, x:245, y:340}, {id:7, x:45, y:340}, {id:8, x:145, y:400}, {id:9, x:145, y:500}
    ];
    let selected = [];
    const container = document.getElementById('tree-container');

    tree.forEach(s => {
        const d = document.createElement('div');
        d.className = 'sephira';
        d.style.left = s.x + 'px'; d.style.top = s.y + 'px';
        d.onclick = () => {
            d.classList.toggle('active');
            if(d.classList.contains('active')) selected.push(s.id);
            else selected = selected.filter(i => i !== s.id);
            
            // בדיקה: חכמה(1), גבורה(4), נצח(6)
            if([1, 4, 6].every(t => selected.includes(t)) && selected.length === 3) {
                document.getElementById('btn-2').disabled = false;
            }
        };
        container.appendChild(d);
    });

    // --- FLAPPY BIRD (קוד מוסתר) ---
    const canvas = document.getElementById('flappy-canvas');
    const ctx = canvas.getContext('2d');
    let bY, bV, sc, gameLoop;

    function initFlappy() {
        bY = 200; bV = 0; sc = 0;
        if(gameLoop) cancelAnimationFrame(gameLoop);
        updateF();
    }

    canvas.onclick = () => bV = -4;

    function updateF() {
        ctx.fillStyle = "black"; ctx.fillRect(0,0,320,480);
        bV += 0.15; bY += bV;
        ctx.fillStyle = "#00ff41"; ctx.fillRect(50, bY, 15, 15);
        sc += 0.015;
        let s = Math.floor(sc);
        ctx.font = "10px monospace"; ctx.fillText(s, 10, 20);

        if(s >= 20) {
            // הקוד מופיע בצבע כמעט שחור על רקע שחור
            document.getElementById('hidden-code').innerText = "V3RIFICATION_ID: 9851";
            document.getElementById('btn-3').disabled = false;
        }

        if(bY>480 || bY<0) initFlappy();
        else gameLoop = requestAnimationFrame(updateF);
    }

    // --- סיום ---
    function checkFinalCode() {
        if(document.getElementById('final-input').value === "9851") {
            alert("מי אלה? איפה אני?");
            document.body.innerHTML = "<div style='display:flex; height:100vh; align-items:center; justify-content:center; background:#000; color:#00ff41;'>DISCONNECTED...</div>";
        }
    }
</script>
</body>
</html>
