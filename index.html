<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TEL-AD | PROJECT_GENESIS</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

        :root {
            --glow: #00ff41;
            --dim-glow: #003b00;
            --error: #ff003c;
            --font: 'VT323', monospace;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; color: var(--glow);
            font-family: var(--font); overflow: hidden;
        }

        /* מנגנון הצגת החדר - מבטיח שכל כפתור יישאר במקום */
        #viewport {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #bg-img {
            width: 100%; height: 100%;
            object-fit: cover; /* מותח את התמונה על כל המסך */
            filter: brightness(0.6) contrast(1.2);
            transition: filter 0.5s;
        }

        /* שכבת ה-Hotspots */
        #interaction-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .hotspot {
            position: absolute;
            cursor: pointer;
            border: 1px solid rgba(0, 255, 65, 0);
            transition: 0.3s;
        }
        .hotspot:hover {
            border: 1px solid var(--glow);
            background: rgba(0, 255, 65, 0.05);
            box-shadow: 0 0 15px var(--glow);
        }

        /* UI עליון - סטטוס */
        #top-ui {
            position: fixed; top: 0; width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            padding: 20px; display: flex; justify-content: space-between;
            z-index: 100; pointer-events: none;
        }

        .status-box { font-size: 24px; text-shadow: 0 0 10px var(--glow); }

        /* קונסולת פקודות (Terminal) */
        #console {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 400px;
            background: rgba(0, 10, 0, 0.95);
            border: 2px solid var(--glow);
            padding: 20px; z-index: 2000;
            display: none; box-shadow: 0 0 50px #000;
        }

        #console-output {
            height: 330px; overflow-y: auto;
            margin-bottom: 10px; font-size: 18px;
            white-space: pre-wrap;
        }

        #console-input {
            width: 100%; background: transparent; border: none;
            color: var(--glow); font-family: var(--font);
            font-size: 20px; outline: none; border-top: 1px solid var(--dim-glow);
        }

        /* אינבנטורי משודרג */
        #inventory {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1000;
        }

        .item-slot {
            width: 80px; height: 80px;
            background: rgba(0, 20, 0, 0.8);
            border: 2px solid var(--dim-glow);
            display: flex; justify-content: center; align-items: center;
            transition: 0.3s;
        }

        .item-slot.active { border-color: var(--glow); box-shadow: 0 0 15px var(--glow); }

        .inv-icon { width: 60%; filter: drop-shadow(0 0 5px var(--glow)); cursor: grab; }

        /* אפקטים */
        .glitch { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, 1px); }
        }

        .scanline {
            width: 100%; height: 2px; background: rgba(0, 255, 65, 0.1);
            position: absolute; z-index: 5000; pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

<div class="scanline"></div>
<div id="top-ui">
    <div class="status-box">SYSTEM: <span id="sys-status">STANDBY</span></div>
    <div class="status-box">CONNECTED_USERS: <span id="user-count">--</span></div>
</div>

<div id="viewport">
    <img id="bg-img" src="https://i.postimg.cc/7Y0z8FX7/image-(70).png">
    <div id="interaction-layer"></div>
</div>

<div id="console">
    <div id="console-output">TEL-AD OS v4.0.2...</div>
    <input type="text" id="console-input" placeholder="Enter Command..." autofocus>
</div>

<div id="inventory">
    <div class="item-slot" id="slot-0"></div>
    <div class="item-slot" id="slot-1"></div>
    <div class="item-slot" id="slot-2"></div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        apiKey: "AIzaSyBmwZMuHZY_c652BWnqiP9tp1QfwutoZAE",
        authDomain: "tel-ad.firebaseapp.com",
        projectId: "tel-ad",
        storageBucket: "tel-ad.firebasestorage.app",
        messagingSenderId: "182338846469",
        appId: "1:182338846469:web:5b84052752e9663555816c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- GAME STATE ---
    let state = {
        currentRoom: 1,
        inventory: [],
        powerRestored: false,
        keycardValidated: false,
        usersOnline: 0
    };

    const roomData = {
        1: {
            url: "https://i.postimg.cc/7Y0z8FX7/image-(70).png",
            spots: [
                { x: 78, y: 82, w: 10, h: 10, action: "take", item: "BATTERY", msg: "סוללה גרעינית אותרה." },
                { x: 50, y: 40, w: 15, h: 30, action: "move", to: 2, msg: "כניסה למעבדה המרכזית..." }
            ]
        },
        2: {
            url: "https://i.postimg.cc/k54D4zNc/image-(71).png",
            spots: [
                { x: 65, y: 78, w: 10, h: 10, action: "take", item: "FUSE", msg: "מכלול פיוזים תקין נמצא." },
                { x: 5, y: 50, w: 15, h: 30, action: "move", to: 3, msg: "כניסה לארכיון הסודי..." }
            ]
        },
        3: {
            url: "https://i.postimg.cc/Fs4Rc7gd/image-(72).png",
            spots: [
                { x: 80, y: 65, w: 8, h: 10, action: "take", item: "KEYCARD", msg: "כרטיס גישה סיווג אדום נמצא." },
                { x: 45, y: 30, w: 15, h: 30, action: "move", to: 4, msg: "כניסה לחדר הליבה..." }
            ]
        },
        4: {
            url: "https://i.postimg.cc/pdpXx8x4/image-(73).png",
            spots: [
                { x: 8, y: 40, w: 12, h: 30, action: "use_power", msg: "נדרשת סוללה ופיוז להפעלת הליבה." },
                { x: 45, y: 70, w: 10, h: 10, action: "open_terminal", msg: "מפעיל מסוף נתונים..." }
            ]
        }
    };

    // --- CORE FUNCTIONS ---

    function loadRoom(id) {
        state.currentRoom = id;
        const room = roomData[id];
        const img = document.getElementById('bg-img');
        img.src = room.url;

        const layer = document.getElementById('interaction-layer');
        layer.innerHTML = '';

        room.spots.forEach(s => {
            const el = document.createElement('div');
            el.className = 'hotspot';
            el.style.cssText = `left:${s.x}%; top:${s.y}%; width:${s.w}%; height:${s.h}%;`;
            el.onclick = () => handleAction(s);
            layer.appendChild(el);
        });
    }

    function handleAction(s) {
        if (s.action === "take") {
            if (!state.inventory.includes(s.item)) {
                state.inventory.push(s.item);
                updateInventoryUI();
                logToTerminal(s.msg);
            }
        } else if (s.action === "move") {
            logToTerminal(s.msg);
            setTimeout(() => loadRoom(s.to), 1000);
        } else if (s.action === "use_power") {
            if (state.inventory.includes("BATTERY") && state.inventory.includes("FUSE")) {
                state.powerRestored = true;
                logToTerminal("חשמל הוחזר למערכת הליבה!");
                document.getElementById('sys-status').innerText = "ONLINE";
            } else {
                logToTerminal("חומרים חסרים: BATTERY, FUSE.");
            }
        } else if (s.action === "open_terminal") {
            if (!state.powerRestored) return logToTerminal("אין מתח למסוף.");
            document.getElementById('console').style.display = 'block';
            document.getElementById('console-input').focus();
        }
    }

    function updateInventoryUI() {
        state.inventory.forEach((item, i) => {
            const slot = document.getElementById(`slot-${i}`);
            slot.innerHTML = `<img src="https://img.icons8.com/wired/64/00ff41/${item.toLowerCase()}.png" class="inv-icon">`;
            slot.classList.add('active');
        });
    }

    // --- TERMINAL LOGIC ---

    const consoleInput = document.getElementById('console-input');
    const consoleOutput = document.getElementById('console-output');

    consoleInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const cmd = consoleInput.value.toUpperCase();
            processCommand(cmd);
            consoleInput.value = '';
        }
    });

    function logToTerminal(txt) {
        consoleOutput.innerHTML += `\n> ${txt}`;
        consoleOutput.scrollTop = consoleOutput.scrollHeight;
    }

    function processCommand(cmd) {
        logToTerminal(cmd);
        if (cmd === "HELP") {
            logToTerminal("COMMANDS: STATUS, UNLOCK, SYNC, EXIT");
        } else if (cmd === "STATUS") {
            logToTerminal(`POWER: ${state.powerRestored}\nUSERS_SYNC: ${state.usersOnline}/5`);
        } else if (cmd === "SYNC") {
            if (state.usersOnline >= 5) {
                logToTerminal("סינכרון רב-משתמשים הצליח...");
                setTimeout(() => logToTerminal("CODE_DECRYPTED: 9851254"), 2000);
            } else {
                logToTerminal(`ERROR: נדרשים 5 משתמשים. חסרים ${5-state.usersOnline}.`);
            }
        } else if (cmd === "EXIT") {
            document.getElementById('console').style.display = 'none';
        } else {
            logToTerminal("COMMAND NOT FOUND.");
        }
    }

    // --- FIREBASE SYNC ---
    const presenceRef = db.ref('online_users');
    const myRef = presenceRef.push(true);
    myRef.onDisconnect().remove();

    presenceRef.on('value', (snap) => {
        state.usersOnline = snap.numChildren();
        document.getElementById('user-count').innerText = state.usersOnline;
    });

    // START GAME
    loadRoom(1);
</script>
</body>
</html>
