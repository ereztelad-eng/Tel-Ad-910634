<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TEL-AD | THE_SYSTEM</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #00ff41; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; height: 100%; }
        .active { display: flex; }

        /* מסך 1: כפתור לחיצה ארוכה */
        #long-press-btn { width: 200px; height: 200px; border-radius: 50%; border: 5px solid #00ff41; background: none; color: #00ff41; font-size: 24px; cursor: pointer; transition: 0.2s; }
        #long-press-btn:active { background: rgba(0, 255, 65, 0.3); transform: scale(0.95); }
        #counter-display { font-size: 48px; margin-bottom: 20px; }

        /* מסך 2: תפריט 3 כפתורים */
        .menu-btn { width: 300px; padding: 20px; margin: 10px; border: 2px solid #00ff41; background: none; color: #00ff41; font-size: 24px; cursor: pointer; font-family: inherit; }
        .menu-btn:disabled { border-color: #333; color: #333; cursor: not-allowed; }

        /* עץ החיים */
        #tree-container { position: relative; width: 300px; height: 500px; margin-top: 20px; }
        .sephira { position: absolute; width: 60px; height: 60px; border-radius: 50%; border: 2px solid #555; background: #222; display: flex; justify-content: center; align-items: center; font-size: 10px; cursor: pointer; user-select: none; }
        .sephira.active { border-color: #00ff41; background: #004400; color: #fff; }

        /* Flappy Bird */
        #flappy-canvas { border: 2px solid #00ff41; background: #050505; }
        
        #final-input { background: none; border: 1px solid #00ff41; color: #00ff41; padding: 10px; font-size: 20px; text-align: center; }
    </style>
</head>
<body>

<!-- מסך 1: הכפתור המשותף -->
<div id="screen-1" class="screen active">
    <div id="counter-display">0 / 7</div>
    <button id="long-press-btn">לחיצה ארוכה</button>
</div>

<!-- מסך 2: התפריט הראשי -->
<div id="screen-2" class="screen">
    <button class="menu-btn" onclick="openSub(1)">כפתור 1: עץ החיים</button>
    <button class="menu-btn" id="btn-2" onclick="openSub(2)" disabled>כפתור 2: פלאפי</button>
    <button class="menu-btn" id="btn-3" onclick="openSub(3)" disabled>כפתור 3: נעילה</button>
</div>

<!-- תת-מסך 1: עץ החיים -->
<div id="sub-1" class="screen">
    <h3>הפעל: חכמה, גבורה, נצח</h3>
    <div id="tree-container"></div>
    <button class="menu-btn" style="width:150px" onclick="backToMenu()">חזרה</button>
</div>

<!-- תת-מסך 2: Flappy Bird -->
<div id="sub-2" class="screen">
    <canvas id="flappy-canvas" width="320" height="480"></canvas>
    <div id="code-reveal" style="margin-top:20px; font-weight:bold;"></div>
    <button class="menu-btn" style="width:150px" onclick="backToMenu()">חזרה</button>
</div>

<!-- תת-מסך 3: הקוד הסופי -->
<div id="sub-3" class="screen">
    <h2>הזן קוד אימות</h2>
    <input type="text" id="final-input" placeholder="????">
    <button class="menu-btn" style="width:150px; margin-top:20px;" onclick="checkFinalCode()">אימות</button>
</div>

<script>
    // --- אתחול Firebase ---
    const firebaseConfig = {
        apiKey: "AIzaSyBmwZMuHZY_c652BWnqiP9tp1QfwutoZAE",
        authDomain: "tel-ad.firebaseapp.com",
        projectId: "tel-ad",
        databaseURL: "https://tel-ad-default-rtdb.firebaseio.com", // וודא שזה ה-URL שלך
        storageBucket: "tel-ad.firebasestorage.app",
        messagingSenderId: "182338846469",
        appId: "1:182338846469:web:5b84052752e9663555816c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // --- לוגיקה מסך 1 (לחיצה ארוכה) ---
    let pressTimer;
    const pressBtn = document.getElementById('long-press-btn');
    const globalCounterRef = db.ref('global_press_count');

    pressBtn.addEventListener('mousedown', () => {
        pressTimer = setTimeout(() => {
            globalCounterRef.transaction(current => (current || 0) + 1);
        }, 1500); // 1.5 שניות לחיצה
    });
    pressBtn.addEventListener('mouseup', () => clearTimeout(pressTimer));

    globalCounterRef.on('value', snap => {
        const val = snap.val() || 0;
        document.getElementById('counter-display').innerText = `${val} / 7`;
        if (val >= 7) {
            showScreen('screen-2');
        }
    });

    // --- ניהול מסכים ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openSub(num) { showScreen(`sub-${num}`); if(num === 2) initFlappy(); }
    function backToMenu() { showScreen('screen-2'); }

    // --- לוגיקה עץ החיים ---
    const sephirot = [
        {n: 'כתר', x:120, y:0}, {n: 'חכמה', x:220, y:60}, {n: 'בינה', x:20, y:60},
        {n: 'חסד', x:220, y:160}, {n: 'גבורה', x:20, y:160}, {n: 'תפארת', x:120, y:220},
        {n: 'נצח', x:220, y:320}, {n: 'הוד', x:20, y:320}, {n: 'יסוד', x:120, y:380}, {n: 'מלכות', x:120, y:480}
    ];
    let activeSephirot = [];

    const treeContainer = document.getElementById('tree-container');
    sephirot.forEach(s => {
        const d = document.createElement('div');
        d.className = 'sephira';
        d.innerText = s.n;
        d.style.left = s.x + 'px'; d.style.top = s.y + 'px';
        d.onclick = () => {
            d.classList.toggle('active');
            if(d.classList.contains('active')) activeSephirot.push(s.n);
            else activeSephirot = activeSephirot.filter(item => item !== s.n);
            
            if(['חכמה', 'גבורה', 'נצח'].every(target => activeSephirot.includes(target))) {
                document.getElementById('btn-2').disabled = false;
            }
        };
        treeContainer.appendChild(d);
    });

    // --- Flappy Bird ---
    const canvas = document.getElementById('flappy-canvas');
    const ctx = canvas.getContext('2d');
    let birdY = 200, birdV = 0, score = 0, gameActive = false;

    function initFlappy() {
        gameActive = true; birdY = 200; birdV = 0; score = 0;
        requestAnimationFrame(updateFlappy);
    }

    canvas.onclick = () => { birdV = -4.5; };

    function updateFlappy() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, 320, 480);
        birdV += 0.2; birdY += birdV;
        ctx.fillStyle = "#00ff41";
        ctx.fillRect(50, birdY, 20, 20);
        
        score += 0.01;
        let displayScore = Math.floor(score);
        ctx.fillText("Score: " + displayScore, 10, 20);

        if(displayScore >= 20) {
            document.getElementById('code-reveal').innerText = "CODE: 9851";
            document.getElementById('btn-3').disabled = false;
        }

        if(birdY > 480 || birdY < 0) { gameActive = false; setTimeout(initFlappy, 1000); }
        else requestAnimationFrame(updateFlappy);
    }

    // --- בדיקה סופית ---
    function checkFinalCode() {
        if(document.getElementById('final-input').value === "9851") {
            alert("מי אלה? איפה אני?");
            window.close();
            // במקרה שדפדפן חוסם window.close:
            document.body.innerHTML = "<h1 style='text-align:center; margin-top:200px'>CONNECTION LOST...</h1>";
        } else {
            alert("קוד שגוי");
        }
    }
</script>
</body>
</html>
